parameters:
  - name: action
    displayName: 'Select Action (apply / destroy)'
    type: string
    default: 'apply'
    values:
      - apply
      - destroy

trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: SimpleCloud_Variable_Group_Secrets

stages:

  # --------------------------------------------------------
  # STEP 1: Always ask user to confirm the selected action
  # --------------------------------------------------------

  - stage: ConfirmAction
    displayName: "Confirm Action"
    jobs:
      - job: WaitForConfirmation
        pool: server
        steps:
          - task: ManualValidation@0
            displayName: "Confirm Selected Action"
            inputs:
              instructions: |
                You are about to run: '${{ parameters.action }}'

                ✅ APPLY  → Creates / updates your Azure infrastructure.
                ❌ DESTROY → Tears down ALL infrastructure. This cannot be undone.

                Please confirm you selected the correct action before approving.
              onTimeout: "reject"
              timeout: "1440"

  # -------------------------------------------------------
  # APPLY FLOW: Plan → Approval → Apply
  # Only runs when action = apply
  # -------------------------------------------------------

  - stage: Plan
    displayName: "Terraform Plan"
    condition: eq('${{ parameters.action }}', 'apply')
    dependsOn: ConfirmAction
    jobs:
      - job: TerraformPlan
        steps:
          - script: |
              wget -O terraform.zip https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
              unzip terraform.zip
              sudo mv terraform /usr/local/bin/
              terraform version
            displayName: "Install Terraform"

          - script: terraform init
            displayName: "Terraform Init"
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - script: terraform plan
            displayName: "Terraform Plan"
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

  - stage: Approval
    displayName: "Waiting for Approval"
    condition: eq('${{ parameters.action }}', 'apply')
    dependsOn: Plan
    jobs:
      - job: WaitForApproval
        pool: server
        steps:
          - task: ManualValidation@0
            displayName: "Approve to proceed with Apply"
            inputs:
              instructions: "Review the Terraform Plan above. Approve to apply changes to Azure."
              onTimeout: "reject"
              timeout: "1440"

  - stage: Apply
    displayName: "Terraform Apply"
    condition: eq('${{ parameters.action }}', 'apply')
    dependsOn: Approval
    jobs:
      - job: TerraformApply
        steps:
          - script: |
              wget -O terraform.zip https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
              unzip terraform.zip
              sudo mv terraform /usr/local/bin/
            displayName: "Install Terraform"

          - script: terraform init
            displayName: "Terraform Init"
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - script: terraform apply -auto-approve
            displayName: "Terraform Apply"
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

  # -------------------------------------------------------
  # DESTROY FLOW: Destroy
  # Only runs when action = destroy
  # -------------------------------------------------------

  - stage: Destroy
    displayName: "Terraform Destroy"
    condition: eq('${{ parameters.action }}', 'destroy')
    dependsOn: ConfirmAction
    jobs:
      - job: TerraformDestroy
        steps:
          - script: |
              wget -O terraform.zip https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
              unzip terraform.zip
              sudo mv terraform /usr/local/bin/
              terraform version
            displayName: "Install Terraform"

          - script: terraform init
            displayName: "Terraform Init"
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - script: terraform destroy -auto-approve
            displayName: "Terraform Destroy"
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)